<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>限编卡收购价格参考 · 迪士尼波普典藏</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0f11;
  --bg2: #16181c;
  --bg3: #1e2026;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0ede8;
  --text2: #8a8782;
  --text3: #555350;
  --gold: #c9a84c;
  --gold2: #e8cc80;
  --gold-dim: rgba(201,168,76,0.15);
  --ur: #a89fe0;  --ur-bg: rgba(168,159,224,0.12);
  --usr: #6bcfaa; --usr-bg: rgba(107,207,170,0.12);
  --sp: #6aaee8;  --sp-bg: rgba(106,174,232,0.12);
  --ssp: #e8b46a; --ssp-bg: rgba(232,180,106,0.12);
  --sl: #e87070;  --sl-bg: rgba(232,112,112,0.12);
  --serif: 'Noto Serif SC', serif;
  --sans: 'Noto Sans SC', sans-serif;
  --mono: 'DM Mono', monospace;
  --radius: 10px;
  --radius-sm: 6px;
}

[data-theme="light"] {
  --bg: #f5f3ef;
  --bg2: #ffffff;
  --bg3: #ebe8e2;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.15);
  --text: #1a1816;
  --text2: #6b6660;
  --text3: #9e9890;
  --gold: #a8872a;
  --gold2: #8a6f1e;
  --gold-dim: rgba(168,135,42,0.12);
  --ur: #7b6fd0;  --ur-bg: rgba(123,111,208,0.10);
  --usr: #3aaa7e; --usr-bg: rgba(58,170,126,0.10);
  --sp: #3a8ace;  --sp-bg: rgba(58,138,206,0.10);
  --ssp: #c8942a; --ssp-bg: rgba(200,148,42,0.10);
  --sl: #d04040;  --sl-bg: rgba(208,64,64,0.10);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 300;
  min-height: 100vh;
  line-height: 1.6;
}

body::before {
  content: '';
  position: fixed;
  top: -200px; left: 50%;
  transform: translateX(-50%);
  width: 800px; height: 400px;
  background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 1320px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem 3rem;
  position: relative;
  z-index: 1;
}

header { text-align: center; margin-bottom: 2rem; }

.kicker {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 0.75rem;
  opacity: 0.85;
}

h1 {
  font-family: var(--serif);
  font-size: clamp(1.5rem, 4vw, 2rem);
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.05em;
  margin-bottom: 0.5rem;
}

.subtitle { font-size: 13px; color: var(--text2); letter-spacing: 0.02em; }

.divider {
  width: 40px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 1.25rem auto;
  opacity: 0.5;
}

.section-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--text2);
  text-transform: uppercase;
  margin-bottom: 0.75rem;
}

/* Reference table */
.ref-wrap {
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  overflow-x: auto;
  margin-bottom: 2rem;
}

table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead tr { background: var(--bg3); border-bottom: 0.5px solid var(--border2); }
th {
  padding: 9px 14px;
  text-align: left;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--text2);
  font-weight: 400;
  white-space: nowrap;
}
th:not(:first-child) { text-align: right; }
td {
  padding: 10px 14px;
  border-bottom: 0.5px solid var(--border);
  vertical-align: middle;
}
td:not(:first-child) { text-align: right; }
tr:last-child td { border-bottom: none; }
tbody tr { background: var(--bg2); }
tbody tr:hover td { background: var(--bg3); transition: background .15s; }

.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 9px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.05em;
}

.card-info { font-size: 11px; color: var(--text2); margin-top: 3px; font-weight: 500; }

.mult-pill {
  display: inline-block;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text2);
  background: var(--bg3);
  padding: 2px 8px;
  border-radius: 4px;
}

.tc-val { font-family: var(--mono); font-weight: 400; }
.tc-bar-wrap { display: flex; align-items: center; gap: 7px; justify-content: flex-end; }
.tc-bar-bg { width: 60px; height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
.tc-bar-fg { height: 100%; border-radius: 2px; }

/* Strategy panels */
.strategies {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 2rem;
}
@media(max-width: 960px) { .strategies { grid-template-columns: 1fr; } }

.strategy {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  transition: border-color .2s;
}
.strategy:hover { border-color: var(--border2); }

.s-title {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.s-ctrl {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 0.6rem;
}

.s-ctrl-label {
  font-size: 12px;
  color: var(--text2);
  min-width: 80px;
  flex-shrink: 0;
}

input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 3px;
  background: var(--bg3);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
  min-width: 0;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--gold);
  border: 2px solid var(--bg);
  cursor: pointer;
  transition: transform .15s;
}
input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
input[type=range]::-moz-range-thumb {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--gold);
  border: 2px solid var(--bg);
  cursor: pointer;
}

.s-ctrl-val {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--gold2);
  min-width: 40px;
  text-align: right;
}

.s-results {
  margin-top: 1rem;
  border-top: 0.5px solid var(--border);
  padding-top: 0.6rem;
}

.s-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 0.5px solid var(--border);
}
.s-row:last-child { border-bottom: none; }

.s-row-left { display: flex; align-items: center; gap: 8px; }
.s-row-cost { font-family: var(--mono); font-size: 11px; color: var(--text3); }
.s-row-right { text-align: right; }
.s-price { font-family: var(--mono); font-size: 15px; font-weight: 500; }
.s-range { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-top: 1px; }

.note {
  padding: 1rem 1.25rem;
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-left: 2px solid var(--gold);
  border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 12px;
  color: var(--text2);
  line-height: 1.8;
  margin-bottom: 2rem;
}
.note strong { color: var(--text); font-weight: 500; }

footer {
  text-align: center;
  font-size: 11px;
  color: var(--text3);
  font-family: var(--mono);
  letter-spacing: 0.05em;
}

.theme-toggle {
  position: fixed;
  top: 1.25rem;
  right: 1.25rem;
  z-index: 99;
  width: 40px; height: 40px;
  border: 0.5px solid var(--border2);
  border-radius: 50%;
  background: var(--bg2);
  color: var(--gold);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s, border-color .2s, transform .2s;
  line-height: 1;
}
.theme-toggle:hover { border-color: var(--gold); transform: scale(1.1); }
</style>
</head>
<body>
<button class="theme-toggle" id="theme-toggle" title="切换浅色/深色模式">☀</button>
<div class="container">
  <header>
    <div class="kicker">闪魂 · 迪士尼米奇和朋友们 · 波普艺术典藏卡</div>
    <h1>限编卡收购价格参考</h1>
    <p class="subtitle">基于开箱成本模型，以 UR 为基准等比估算各稀有度合理收购价</p>
    <div class="divider"></div>
  </header>

  <div class="section-label">· 卡牌基础数据</div>
  <div class="ref-wrap">
    <table>
      <thead><tr><th>类型</th><th>相对 UR 倍数</th><th>总流通量</th></tr></thead>
      <tbody id="ref-tbody"></tbody>
    </table>
  </div>

  <div class="section-label">· 收购策略对比</div>
  <div class="strategies" id="strategies"></div>

  <div class="note">
    <strong>定价逻辑：</strong>UR 是最常见限编，基准成本可自行设定。其他类型按 <em>UR 出率 ÷ 该卡出率</em> 等比放大：USR 1.3×、SP 2×、SSP 8×、SL 40×。流通量溢价基于总印量取对数压缩；SL 全系列仅 <strong>924 张</strong>，是 UR（39,900 张）的 1/43。
  </div>

  <footer>以上数据仅供参考 · 实际成交价请结合二级市场行情判断</footer>
</div>

<script>
var CARDS = [
  { name:'UR',  rate:0.04,  designs:100, limit:399, color:'var(--ur)',  bg:'var(--ur-bg)',  bar:'#a89fe0' },
  { name:'USR', rate:0.03,  designs:100, limit:299, color:'var(--usr)', bg:'var(--usr-bg)', bar:'#6bcfaa' },
  { name:'SP',  rate:0.02,  designs:100, limit:199, color:'var(--sp)',  bg:'var(--sp-bg)',  bar:'#6aaee8' },
  { name:'SSP', rate:0.005, designs:49,  limit:99,  color:'var(--ssp)', bg:'var(--ssp-bg)', bar:'#e8b46a' },
  { name:'SL',  rate:0.001, designs:14,  limit:66,  color:'var(--sl)',  bg:'var(--sl-bg)',  bar:'#e87070' }
];

var UR_RATE = 0.04;
var maxTC = CARDS[0].designs * CARDS[0].limit;
var minTC = CARDS[4].designs * CARDS[4].limit;

function calcTC(c)  { return c.designs * c.limit; }
function calcSF(c) {
  var t = calcTC(c);
  return (Math.log(maxTC) - Math.log(t)) / (Math.log(maxTC) - Math.log(minTC));
}
function fmt(n) { return '¥' + Math.round(n).toLocaleString('zh-CN'); }

(function() {
  var tbody = document.getElementById('ref-tbody');
  CARDS.forEach(function(c) {
    var mult = UR_RATE / c.rate;
    var t = calcTC(c);
    var barW = Math.round((1 - calcSF(c)) * 100);
    var multStr = mult === 1 ? '× 1 <span style="color:var(--text3);font-size:11px">基准</span>'
                             : '× ' + (Number.isInteger(mult) ? mult : mult.toFixed(1));
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td>'
        + '<span class="badge" style="background:' + c.bg + ';color:' + c.color + '">' + c.name + '</span>'
        + '<div class="card-info">' + c.designs + ' 款 · 限编 ' + c.limit + '</div>'
      + '</td>'
      + '<td><span class="mult-pill">' + multStr + '</span></td>'
      + '<td>'
        + '<div class="tc-bar-wrap">'
          + '<div class="tc-bar-bg"><div class="tc-bar-fg" style="width:' + barW + '%;background:' + c.bar + '"></div></div>'
          + '<span class="tc-val">' + t.toLocaleString('zh-CN') + '</span>'
        + '</div>'
      + '</td>';
    tbody.appendChild(tr);
  });
})();

(function() {
  var wrap = document.getElementById('strategies');
  for (var i = 1; i <= 3; i++) {
    var id = 's' + i;
    var panel = document.createElement('div');
    panel.className = 'strategy';
    panel.innerHTML =
      '<div class="s-title">策略 ' + i + '</div>'
      + '<div class="s-ctrl">'
        + '<span class="s-ctrl-label">UR 基准成本</span>'
        + '<input type="range" id="' + id + '-cost" min="100" max="800" step="10">'
        + '<span class="s-ctrl-val" id="' + id + '-cost-out"></span>'
      + '</div>'
      + '<div class="s-ctrl">'
        + '<span class="s-ctrl-label">基础收购比例</span>'
        + '<input type="range" id="' + id + '-ratio" min="0" max="100" step="1">'
        + '<span class="s-ctrl-val" id="' + id + '-ratio-out"></span>'
      + '</div>'
      + '<div class="s-ctrl">'
        + '<span class="s-ctrl-label">流通量溢价</span>'
        + '<input type="range" id="' + id + '-scarc" min="0" max="100" step="1">'
        + '<span class="s-ctrl-val" id="' + id + '-scarc-out"></span>'
      + '</div>'
      + '<div class="s-results" id="' + id + '-results"></div>';
    wrap.appendChild(panel);
  }
})();

function renderStrategy(idx) {
  var id = 's' + idx;
  var box   = parseInt(document.getElementById(id + '-cost').value);
  var ratio = parseInt(document.getElementById(id + '-ratio').value) / 100;
  var scarc = parseInt(document.getElementById(id + '-scarc').value) / 100;

  document.getElementById(id + '-cost-out').textContent  = '¥' + box;
  document.getElementById(id + '-ratio-out').textContent = Math.round(ratio * 100) + '%';
  document.getElementById(id + '-scarc-out').textContent = Math.round(scarc * 100) + '%';

  var el = document.getElementById(id + '-results');
  el.innerHTML = '';

  CARDS.forEach(function(c) {
    var ec   = box * (UR_RATE / c.rate);
    var sf   = calcSF(c);
    var adj  = Math.min(ratio + scarc * sf * 0.6, 1.0);
    var buy  = Math.round(ec * adj / 10) * 10;
    var low  = Math.max(0, Math.round(ec * Math.max(adj - 0.05, 0) / 10) * 10);
    var high = Math.round(ec * (adj + 0.05) / 10) * 10;

    var row = document.createElement('div');
    row.className = 's-row';
    row.innerHTML =
      '<div class="s-row-left">'
        + '<span class="badge" style="background:' + c.bg + ';color:' + c.color + '">' + c.name + '</span>'
        + '<span class="s-row-cost">成本 ' + fmt(ec) + '</span>'
      + '</div>'
      + '<div class="s-row-right">'
        + '<div class="s-price" style="color:' + c.color + '">' + (buy === 0 ? '—' : fmt(buy)) + '</div>'
        + '<div class="s-range">' + fmt(low) + ' – ' + fmt(high) + '</div>'
      + '</div>';
    el.appendChild(row);
  });
}

for (var i = 1; i <= 3; i++) {
  (function(idx) {
    var id = 's' + idx;
    var costEl  = document.getElementById(id + '-cost');
    var ratioEl = document.getElementById(id + '-ratio');
    var scarcEl = document.getElementById(id + '-scarc');

    costEl.value  = localStorage.getItem(id + '_cost')  || '300';
    ratioEl.value = localStorage.getItem(id + '_ratio') || '40';
    scarcEl.value = localStorage.getItem(id + '_scarc') || '25';

    function save() {
      localStorage.setItem(id + '_cost',  costEl.value);
      localStorage.setItem(id + '_ratio', ratioEl.value);
      localStorage.setItem(id + '_scarc', scarcEl.value);
      renderStrategy(idx);
    }
    costEl.addEventListener('input', save);
    ratioEl.addEventListener('input', save);
    scarcEl.addEventListener('input', save);
    renderStrategy(idx);
  })(i);
}

(function() {
  var btn = document.getElementById('theme-toggle');
  var html = document.documentElement;
  var saved = localStorage.getItem('theme');
  if (saved === 'light') {
    html.setAttribute('data-theme', 'light');
    btn.textContent = '☾';
  }
  btn.addEventListener('click', function() {
    var isLight = html.getAttribute('data-theme') === 'light';
    if (isLight) {
      html.removeAttribute('data-theme');
      btn.textContent = '☀';
      localStorage.setItem('theme', 'dark');
    } else {
      html.setAttribute('data-theme', 'light');
      btn.textContent = '☾';
      localStorage.setItem('theme', 'light');
    }
  });
})();
</script>
</body>
</html>
