<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


    <script src="https://pre-www.zhipin.com/web/common/tools/browser-check.js" crossorigin="anonymous"></script>

    <script>
        function getResourceSrc(element) {
            const getSrc = (el) => el.src || el.href || el.currentSrc || ''
            return getSrc(element)
        }
        window.addEventListener('error', (event) => {
            console.log('window error', event, event.target)
            console.log('resource src', getResourceSrc(event.target))
        }, true)
    </script>
</head>

<body>
    <script>
        const url = 'https://pre-www.zhipin.com/web/common/tools/browser-check.js'
        setTimeout(() => {
            const script = document.createElement('script')
            script.src = url
            script.onload = () => {
                console.log('script onload')
            }
            script.onerror = () => {
                console.log('script onerror 1')
            }
            document.body.appendChild(script)
        }, 3000)
    </script>
</body>

</html>
